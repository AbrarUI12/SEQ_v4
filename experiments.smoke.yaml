version: 1
model:
  name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  device: cuda
  dtype: float16
seeds:
  global: 1234
  eval: 1234
calibration:
  seq_len: 128
  bins: 256
  bootstrap_iters: 20
  clip: 6.0
  eps: 1.0e-05
  min_samples: 4096
  max_nan_frac: 0.01
thresholds:
  weight_high_pct: 0.9
  act_high_pct: 0.9
sweeps:
  sweep_1:
    weight_high_pct: 0.85
    act_high_pct: 0.85
  sweep_2:
    weight_high_pct: 0.9
    act_high_pct: 0.9
protections:
  exclude_embeddings: true
  lm_head_min_tier: fp16
  protect_first_last_blocks: true
  num_protected_blocks: 1
  protect_attn_out_proj: true
evaluation:
  enabled_metric_groups:
    - seq_core
    - latency_memory
    - size
    - quant_accounting
  seq_metrics:
    ppl:
      enabled: true
      dataset: wikitext2
      split: validation
      seq_len: 128
      max_examples: 8
      stride: null
      full_corpus: false
    tail_risk:
      enabled: true
    json_stress:
      enabled: true
    temperature_sweep:
      enabled: true
    long_context:
      enabled: true
      needle_lengths: [512, 1024]
    latency_memory:
      enabled: true
      warmup_runs: 1
      measured_runs: 1
    size:
      enabled: true
  lm_eval:
    enabled: false
    tasks: [hellaswag]
    num_fewshot: 0
    batch_size: 1
    limit: 5
    device: cuda:0
    apply_chat_template: false
    log_samples: false
    use_cache: null
    model_backend: hf
    extra_model_args: {}
    output_subdir: lm_eval
    fail_policy: warn
    task_preset: smoke
    quantized_reloadable: false
  lm_eval_presets:
    smoke:
      tasks: [hellaswag]
      limit: 5
      num_fewshot: 0
    standard:
      tasks: [hellaswag, arc_easy, arc_challenge, piqa, winogrande]
      limit: null
      num_fewshot: 0
    paper:
      tasks: [hellaswag, arc_easy, arc_challenge, piqa, winogrande, lambada_openai]
      limit: null
      num_fewshot: 0
  max_new_tokens: 32
  temperature: 0.7
  top_p: 0.95
  latency_prompt: Explain quantization in one sentence.
  warmup_runs: 1
  measured_runs: 1
  mmlu:
    enabled: false
  zero_shot:
    enabled: false
compare_methods:
  rtn:
    group_size: 64
    quant_type: fp4
    double_quant: false
  zeroquant:
    max_samples: 4
    act_clip_scale: 1.0
    bias_correction: true
    int8_threshold: 6.0
  omniquant:
    enabled: false
    wbits: 4
    abits: 16
    epochs: 2
    max_samples: 4
    alpha: 0.6
    group_size: 64
    lwc: true
    let: false
    calib_dataset: wikitext2
    upstream_eval_ppl: false
  spinquant:
    group_size: 64
    rotation_mode: hadamard
    hadamard_block_size: 64
    quant_type: fp4
    double_quant: false
benchmarks:
  run_ppl: true
  run_size: true
  ppl_mode: proxy
  ppl_dataset: wikitext2
  ppl_split: validation
  ppl_seq_len: 128
  ppl_max_examples: 8
  ppl_stride: null
  ppl_full_corpus: false
  run_long_ppl: false
  long_ppl_seq_len: 1024
experiments:
- name: main
  policy: dual_entropy
- name: random_policy
  policy: random_policy
- name: magnitude_baseline
  policy: magnitude_baseline
- name: weight_only
  policy: weight_only
- name: activation_only
  policy: activation_only
- name: sweep_1
  policy: dual_entropy
  thresholds: sweep_1
- name: sweep_2
  policy: dual_entropy
  thresholds: sweep_2
