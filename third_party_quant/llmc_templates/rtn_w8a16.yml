base:
  seed: 42

model:
  type: Opt
  path: facebook/opt-125m
  torch_dtype: auto
  tokenizer_mode: slow

calib:
  name: wikitext2
  download: true
  n_samples: 4
  bs: 1
  seq_len: 128
  preproc: txt_general_preproc
  seed: 42

eval:
  eval_pos:
    - fake_quant
  name: wikitext2
  download: true
  bs: 1
  seq_len: 128
  inference_per_block: true

quant:
  method: RTN
  weight:
    bit: 8
    symmetric: true
    granularity: per_group
    group_size: 128

save:
  save_trans: false
  save_fake: false
  save_vllm: false
  save_path: /tmp/llmc_save_placeholder
