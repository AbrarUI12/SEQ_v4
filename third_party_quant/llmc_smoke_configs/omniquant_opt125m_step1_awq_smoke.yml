base:
  seed: &seed 42
model:
  type: Opt
  path: facebook/opt-125m
  torch_dtype: auto
  tokenizer_mode: slow
calib:
  name: wikitext2
  download: true
  n_samples: 4
  bs: -1
  seq_len: 128
  preproc: txt_general_preproc
  seed: *seed
eval:
  eval_pos:
    - fake_quant
  name: wikitext2
  download: true
  bs: 1
  seq_len: 128
  inference_per_block: true
quant:
  method: Awq
  weight:
    bit: 4
    symmetric: false
    granularity: per_group
    group_size: 128
    calib_algo: minmax
  special:
    trans: true
    trans_version: v1
    weight_clip: false
    save_scale: false
    save_clip: false
save:
  save_trans: true
  save_fake: false
  save_vllm: false
  save_path: /mnt/e/SEQ_Clean/results/llmc_smoke/omniquant_opt125m_step1_awq
