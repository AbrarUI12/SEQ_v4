base:
  seed: &seed 42
model:
  type: Opt
  path: facebook/opt-125m
  torch_dtype: auto
  tokenizer_mode: slow
calib:
  name: wikitext2
  download: true
  n_samples: 4
  bs: 1
  seq_len: 128
  preproc: wikitext2_gptq
  seed: *seed
eval:
  eval_pos:
    - fake_quant
  name: wikitext2
  download: true
  bs: 1
  seq_len: 128
  inference_per_block: true
quant:
  method: OmniQuant
  weight:
    bit: 4
    symmetric: false
    granularity: per_group
    group_size: 128
    calib_algo: learnable
    ste: true
  special:
    aug_loss: false
    lwc: true
    let: false
    lwc_lr: 0.01
    let_lr: 0.005
    use_shift: false
    alpha: 0.5
    deactive_amp: true
    epochs: 20
    wd: 0
  quant_out: true
save:
  save_trans: false
  save_fake: false
  save_vllm: false
  save_path: /mnt/e/SEQ_Clean/results/llmc_smoke/omniquant_opt125m_tiny_128
