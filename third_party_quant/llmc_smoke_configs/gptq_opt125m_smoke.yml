base:
    seed: &seed 42
model:
    type: Opt
    path: facebook/opt-125m
    torch_dtype: auto
    tokenizer_mode: slow
calib:
    name: wikitext2
    download: true
    n_samples: 4
    bs: 1
    seq_len: 128
    preproc: wikitext2_gptq
    seed: *seed
eval:
    eval_pos:
        - fake_quant
    name: wikitext2
    download: true
    bs: 1
    seq_len: 128
    inference_per_block: true
quant:
    method: GPTQ
    weight:
        bit: 4
        symmetric: false
        granularity: per_group
        group_size: 128
    special:
        actorder: true
        static_groups: false
        percdamp: 0.01
        blocksize: 128
        true_sequential: true
    quant_out: true
save:
    save_trans: false
    save_fake: false
    save_vllm: false
    save_path: /mnt/e/SEQ_Clean/results/llmc_smoke/gptq_opt125m_tiny_128
