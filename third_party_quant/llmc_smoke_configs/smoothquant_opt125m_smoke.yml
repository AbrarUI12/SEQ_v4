base:
    seed: &seed 42
model:
    type: Opt
    path: facebook/opt-125m
    torch_dtype: auto
    tokenizer_mode: slow
calib:
    name: wikitext2
    download: true
    n_samples: 4
    bs: 1
    seq_len: 128
    preproc: txt_general_preproc
    seed: *seed
eval:
    eval_pos:
        - fake_quant
    name: wikitext2
    download: true
    bs: 1
    seq_len: 128
    inference_per_block: true
quant:
    method: SmoothQuant
    weight:
        bit: 8
        symmetric: true
        granularity: per_channel
    act:
        bit: 8
        symmetric: true
        granularity: per_token
    special:
        alpha: 0.8
save:
    save_trans: false
    save_fake: false
    save_vllm: false
    save_path: /mnt/e/SEQ_Clean/results/llmc_smoke/smoothquant_opt125m_tiny_128
